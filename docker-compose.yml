volumes:
  n8n_storage:
  postgres_storage:
  minio_storage:
  rabbitmq_storage:
  ollama_storage:
  qdrant_storage:
  open-webui:
  flowise:

networks:
  demo:

x-n8n: &service-n8n
  build:
    context: .
    dockerfile: Dockerfile.n8n
    args:
      N8N_IMAGE: ${N8N_IMAGE:-n8nio/n8n:2.27.4}
  networks: ['demo']
  environment:
    - DB_TYPE=postgresdb
    - DB_POSTGRESDB_HOST=postgres
    - DB_POSTGRESDB_PORT=5432
    - DB_POSTGRESDB_DATABASE=${POSTGRES_DB}
    - DB_POSTGRESDB_USER=${POSTGRES_USER}
    - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
    - N8N_DIAGNOSTICS_ENABLED=false
    - N8N_PERSONALIZATION_ENABLED=false
    - N8N_ENCRYPTION_KEY
    - N8N_USER_MANAGEMENT_JWT_SECRET
    - N8N_DEFAULT_BINARY_DATA_MODE=${N8N_DEFAULT_BINARY_DATA_MODE:-filesystem}
    - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
    - N8N_SECURE_COOKIE=${N8N_SECURE_COOKIE:-true}
    - N8N_RELEASE_DATE=${N8N_RELEASE_DATE:-2025-03-06T00:00:00Z}
    - WEBHOOK_URL=${WEBHOOK_URL:-http://localhost:5678}
    - N8N_SSRF_PROTECTION_ENABLED=true
    - N8N_SSRF_ALLOWED_HOSTNAMES=host.docker.internal
    - N8N_SSRF_ALLOWED_IP_RANGES=192.168.65.254/32
    - CONTENTFUL_MANAGEMENT_TOKEN=${CONTENTFUL_MANAGEMENT_TOKEN}
    - CONTENTFUL_SPACE_ID=${CONTENTFUL_SPACE_ID}
    - CONTENTFUL_ENV_ID=${CONTENTFUL_ENV_ID}
    - NODE_FUNCTION_ALLOW_EXTERNAL=${NODE_FUNCTION_ALLOW_EXTERNAL}
    - NODES_EXCLUDE=[]
    - N8N_RESTRICT_FILE_ACCESS_TO=${N8N_RESTRICT_FILE_ACCESS_TO:-/home/node/.n8n-files,/backup,/data/shared}
    - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
    - N8N_SKIP_AUTH_ON_OAUTH_CALLBACK=false
    - OLLAMA_HOST=${OLLAMA_HOST:-ollama:11434}
    - MEDIA_DISPATCH_MODE=${MEDIA_DISPATCH_MODE:-http}
    - RABBITMQ_URL=${RABBITMQ_URL:-amqp://media_dispatch:change-me@rabbitmq:5672/}
    - RABBITMQ_EXCHANGE=${RABBITMQ_EXCHANGE:-media.jobs}
    - RABBITMQ_QUEUE=${RABBITMQ_QUEUE:-media.jobs.ready}
    - RABBITMQ_RETRY_EXCHANGE=${RABBITMQ_RETRY_EXCHANGE:-media.jobs.retry}
    - RABBITMQ_RETRY_QUEUE=${RABBITMQ_RETRY_QUEUE:-media.jobs.retry.1m}
    - RABBITMQ_DEAD_QUEUE=${RABBITMQ_DEAD_QUEUE:-media.jobs.dead}
  env_file:
    - .env
  extra_hosts:
    - "host.docker.internal:host-gateway"

x-ollama: &service-ollama
  image: ${OLLAMA_IMAGE:-ollama/ollama:latest}
  container_name: ollama
  networks: ['demo']
  restart: unless-stopped
  environment:
    - OLLAMA_NUM_THREADS=${OLLAMA_NUM_THREADS:-2}
  ports:
    - 11434:11434
  volumes:
    - ollama_storage:/root/.ollama

x-init-ollama: &init-ollama
  image: ${OLLAMA_IMAGE:-ollama/ollama:latest}
  networks: ['demo']
  container_name: ollama-pull-llama
  volumes:
    - ollama_storage:/root/.ollama
  entrypoint: /bin/sh
  environment:
    - OLLAMA_HOST=ollama:11434
    - OLLAMA_PULL_MODELS=${OLLAMA_PULL_MODELS:-qwen2.5:1.5b,nomic-embed-text}
  command:
    - "-c"
    - |
      set -eu

      echo "Waiting for Ollama API at $$OLLAMA_HOST..."
      retries=60
      until ollama list >/dev/null 2>&1; do
        retries=$$((retries - 1))
        if [ "$$retries" -le 0 ]; then
          echo "Timed out waiting for Ollama"
          exit 1
        fi
        sleep 2
      done

      models="$$(printf '%s' "$$OLLAMA_PULL_MODELS" | tr ',\n' '  ')"

      if [ -z "$$(printf '%s' "$$models" | tr -d ' ')" ]; then
        echo "No Ollama models configured for pre-pull"
        exit 0
      fi

      for model in $$models; do
        echo "Pulling Ollama model: $$model"
        ollama pull "$$model"
      done

services:
  flowise:
    image: flowiseai/flowise
    container_name: flowise
    networks: ['demo']
    restart: unless-stopped
    environment:
      - PORT=3001
    ports:
      - 3001:3001
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - flowise:/root/.flowise
    entrypoint: /bin/sh -c "sleep 3; flowise start"

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    networks: ['demo']
    restart: unless-stopped
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - open-webui:/app/backend/data

  postgres:
    image: postgres:16-alpine
    hostname: postgres
    networks: ['demo']
    restart: unless-stopped
    ports:
      - 5432:5432
    environment:
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - POSTGRES_DB
    volumes:
      - postgres_storage:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -h localhost -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: ${MINIO_IMAGE:-quay.io/minio/minio:latest}
    hostname: minio
    container_name: minio
    networks: ['demo']
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:?set MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD}
      - MINIO_BROWSER_REDIRECT_URL=${MINIO_BROWSER_REDIRECT_URL:-}
      - MINIO_SERVER_URL=${MINIO_SERVER_URL:-}
    ports:
      - 9000:9000
      - 9001:9001
    volumes:
      - minio_storage:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: ${RABBITMQ_IMAGE:-rabbitmq:3.13-management-alpine}
    hostname: rabbitmq
    container_name: rabbitmq
    networks: ['demo']
    restart: unless-stopped
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER:?set RABBITMQ_DEFAULT_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASS:?set RABBITMQ_DEFAULT_PASS}
      - RABBITMQ_DEFAULT_VHOST=${RABBITMQ_DEFAULT_VHOST:-/}
    ports:
      - "${RABBITMQ_HOST_BIND:-127.0.0.1}:5672:5672"
      - "${RABBITMQ_MANAGEMENT_HOST_BIND:-127.0.0.1}:15672:15672"
    volumes:
      - rabbitmq_storage:/var/lib/rabbitmq
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  n8n-import:
    <<: *service-n8n
    hostname: n8n-import
    container_name: n8n-import
    environment:
      - N8N_IMPORT_MODE=${N8N_IMPORT_MODE:-bootstrap}
      - N8N_IMPORT_FORMAT=${N8N_IMPORT_FORMAT:-split}
    entrypoint: /bin/sh
    command:
      - "-c"
      - |
        set -e

        echo "Waiting for directory setup..."
        sleep 5

        import_mode="${N8N_IMPORT_MODE:-bootstrap}"
        import_format="${N8N_IMPORT_FORMAT:-split}"
        existing_workflows="$(n8n list:workflow --onlyId 2>/dev/null || true)"

        if [ "$$import_mode" = "bootstrap" ] && [ -n "$$existing_workflows" ]; then
          echo "Existing workflows detected; skipping bootstrap import"
          exit 0
        fi

        if [ "$$import_mode" = "restore" ]; then
          echo "Restore mode enabled; importing over existing state if payloads are present"
        else
          echo "Bootstrap mode enabled"
        fi

        if [ "$$import_format" = "entities" ]; then
          if [ -d "/backup/entities" ] && [ "$(ls -A /backup/entities 2>/dev/null)" ]; then
            echo "Importing entities from backup..."
            if [ "$$import_mode" = "restore" ]; then
              n8n import:entities --inputDir=/backup/entities --truncateTables
            else
              n8n import:entities --inputDir=/backup/entities
            fi
          elif [ -d "/demo-data/entities" ] && [ "$(ls -A /demo-data/entities 2>/dev/null)" ]; then
            echo "Importing demo entities..."
            n8n import:entities --inputDir=/demo-data/entities
          else
            echo "No entities import needed"
          fi
          exit 0
        fi

        if [ -d "/backup/credentials" ] && [ "$(ls -A /backup/credentials 2>/dev/null)" ]; then
          echo "Importing credentials from backup..."
          n8n import:credentials --separate --input=/backup/credentials
        elif [ -d "/demo-data/credentials" ] && [ "$(ls -A /demo-data/credentials 2>/dev/null)" ]; then
          echo "Importing demo credentials..."
          n8n import:credentials --separate --input=/demo-data/credentials
        else
          echo "No credentials import needed"
        fi

        if [ -d "/backup/workflows" ] && [ "$(ls -A /backup/workflows 2>/dev/null)" ]; then
          echo "Importing workflows from backup..."
          n8n import:workflow --separate --input=/backup/workflows
        elif [ -d "/demo-data/workflows" ] && [ "$(ls -A /demo-data/workflows 2>/dev/null)" ]; then
          echo "Importing demo workflows..."
          n8n import:workflow --separate --input=/demo-data/workflows
        else
          echo "No workflow import needed"
        fi
    volumes:
      - ./n8n/demo-data:/demo-data
      - ./n8n/backup:/backup
      - ./n8n/files:/home/node/.n8n-files
    depends_on:
      postgres:
        condition: service_healthy

  n8n:
    <<: *service-n8n
    hostname: n8n
    container_name: n8n
    restart: unless-stopped
    ports:
      - 5678:5678
    volumes:
      - n8n_storage:/home/node/.n8n
      - ./n8n/demo-data:/demo-data
      - ./n8n/backup:/backup
      - ./shared:/data/shared
      - ./n8n/files:/home/node/.n8n-files
    depends_on:
      postgres:
        condition: service_healthy
      n8n-import:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:5678/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant
    hostname: qdrant
    container_name: qdrant
    networks: ['demo']
    restart: unless-stopped
    ports:
      - 6333:6333
    volumes:
      - qdrant_storage:/qdrant/storage

  ollama-cpu:
    profiles: ["cpu"]
    <<: *service-ollama

  ollama-gpu:
    profiles: ["gpu-nvidia"]
    <<: *service-ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  ollama-gpu-amd:
    profiles: ["gpu-amd"]
    <<: *service-ollama
    image: ollama/ollama:rocm
    devices:
      - "/dev/kfd"
      - "/dev/dri"

  ollama-pull-llama-cpu:
    profiles: ["cpu"]
    <<: *init-ollama
    depends_on:
      - ollama-cpu

  ollama-pull-llama-gpu:
    profiles: ["gpu-nvidia"]
    <<: *init-ollama
    depends_on:
      - ollama-gpu

  ollama-pull-llama-gpu-amd:
    profiles: [gpu-amd]
    <<: *init-ollama
    image: ollama/ollama:rocm
    depends_on:
      - ollama-gpu-amd
