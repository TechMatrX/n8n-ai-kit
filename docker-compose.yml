volumes:
  n8n_storage:
  postgres_storage:
  ollama_storage:
  qdrant_storage:
  open-webui:
  flowise:

networks:
  demo:

x-n8n: &service-n8n
  build:
    context: .
    dockerfile: Dockerfile.n8n
  networks: ['demo']
  environment:
    - DB_TYPE=postgresdb
    - DB_POSTGRESDB_HOST=postgres
    - DB_POSTGRESDB_PORT=5432
    - DB_POSTGRESDB_DATABASE=${POSTGRES_DB}
    - DB_POSTGRESDB_USER=${POSTGRES_USER}
    - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
    - N8N_DIAGNOSTICS_ENABLED=false
    - N8N_PERSONALIZATION_ENABLED=false
    - N8N_ENCRYPTION_KEY
    - N8N_USER_MANAGEMENT_JWT_SECRET
    - N8N_DEFAULT_BINARY_DATA_MODE=${N8N_DEFAULT_BINARY_DATA_MODE:-filesystem}
    - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
    - N8N_SECURE_COOKIE=${N8N_SECURE_COOKIE:-true}
    - N8N_RUNNERS_ENABLED=true
    - N8N_RELEASE_DATE=${N8N_RELEASE_DATE:-2025-03-06T00:00:00Z}
    - WEBHOOK_URL=${WEBHOOK_URL:-http://localhost:5678}
    - N8N_SSRF_PROTECTION_ENABLED=true
    - N8N_SSRF_ALLOWED_HOSTNAMES=host.docker.internal
    - N8N_SSRF_ALLOWED_IP_RANGES=192.168.65.254/32
    - CONTENTFUL_MANAGEMENT_TOKEN=${CONTENTFUL_MANAGEMENT_TOKEN}
    - CONTENTFUL_SPACE_ID=${CONTENTFUL_SPACE_ID}
    - CONTENTFUL_ENV_ID=${CONTENTFUL_ENV_ID}
    - NODE_FUNCTION_ALLOW_EXTERNAL=${NODE_FUNCTION_ALLOW_EXTERNAL}
    - NODES_EXCLUDE=[]
    - N8N_RESTRICT_FILE_ACCESS_TO=${N8N_RESTRICT_FILE_ACCESS_TO:-/home/node/.n8n-files,/backup,/data/shared}
    - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
    - N8N_SKIP_AUTH_ON_OAUTH_CALLBACK=false
    - OLLAMA_HOST=${OLLAMA_HOST:-ollama:11434}
  env_file:
    - .env
  extra_hosts:
    - "host.docker.internal:host-gateway"

x-ollama: &service-ollama
  image: ollama/ollama:latest
  container_name: ollama
  networks: ['demo']
  restart: unless-stopped
  ports:
    - 11434:11434
  volumes:
    - ollama_storage:/root/.ollama

x-init-ollama: &init-ollama
  image: ollama/ollama:latest
  networks: ['demo']
  container_name: ollama-pull-llama
  volumes:
    - ollama_storage:/root/.ollama
  entrypoint: /bin/sh
  environment:
    - OLLAMA_HOST=ollama:11434
  command:
    - "-c"
    - "sleep 3; ollama pull llama3.2; ollama pull nomic-embed-text"

services:
  flowise:
    image: flowiseai/flowise
    container_name: flowise
    networks: ['demo']
    restart: unless-stopped
    environment:
      - PORT=3001
    ports:
      - 3001:3001
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - flowise:/root/.flowise
    entrypoint: /bin/sh -c "sleep 3; flowise start"

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    networks: ['demo']
    restart: unless-stopped
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - open-webui:/app/backend/data

  postgres:
    image: postgres:16-alpine
    hostname: postgres
    networks: ['demo']
    restart: unless-stopped
    ports:
      - 5432:5432
    environment:
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - POSTGRES_DB
    volumes:
      - postgres_storage:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -h localhost -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10

  n8n-import:
    <<: *service-n8n
    hostname: n8n-import
    container_name: n8n-import
    entrypoint: /bin/sh
    command:
      - "-c"
      - |
        set -e

        echo "Waiting for directory setup..."
        sleep 5

        if [ -d "/backup/credentials" ] && [ "$(ls -A /backup/credentials 2>/dev/null)" ]; then
          echo "Importing credentials from backup..."
          n8n import:credentials --separate --input=/backup/credentials
        elif [ -d "/demo-data/credentials" ] && [ "$(ls -A /demo-data/credentials 2>/dev/null)" ] && [ -z "$(n8n list:workflow --onlyId)" ]; then
          echo "Importing demo credentials..."
          n8n import:credentials --separate --input=/demo-data/credentials
        else
          echo "No credentials import needed"
        fi

        if [ -d "/backup/workflows" ] && [ "$(ls -A /backup/workflows 2>/dev/null)" ]; then
          echo "Importing workflows from backup..."
          n8n import:workflow --separate --input=/backup/workflows
        elif [ -d "/demo-data/workflows" ] && [ "$(ls -A /demo-data/workflows 2>/dev/null)" ] && [ -z "$(n8n list:workflow --onlyId)" ]; then
          echo "Importing demo workflows..."
          n8n import:workflow --separate --input=/demo-data/workflows
        else
          echo "No workflow import needed"
        fi
    volumes:
      - ./n8n/demo-data:/demo-data
      - ./n8n/backup:/backup
      - ./n8n/files:/home/node/.n8n-files
    depends_on:
      postgres:
        condition: service_healthy

  n8n:
    <<: *service-n8n
    hostname: n8n
    container_name: n8n
    restart: unless-stopped
    ports:
      - 5678:5678
    volumes:
      - n8n_storage:/home/node/.n8n
      - ./n8n/demo-data:/demo-data
      - ./n8n/backup:/backup
      - ./shared:/data/shared
      - ./n8n/files:/home/node/.n8n-files
    depends_on:
      postgres:
        condition: service_healthy
      n8n-import:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:5678/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant
    hostname: qdrant
    container_name: qdrant
    networks: ['demo']
    restart: unless-stopped
    ports:
      - 6333:6333
    volumes:
      - qdrant_storage:/qdrant/storage

  ollama-cpu:
    profiles: ["cpu"]
    <<: *service-ollama

  ollama-gpu:
    profiles: ["gpu-nvidia"]
    <<: *service-ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  ollama-gpu-amd:
    profiles: ["gpu-amd"]
    <<: *service-ollama
    image: ollama/ollama:rocm
    devices:
      - "/dev/kfd"
      - "/dev/dri"

  ollama-pull-llama-cpu:
    profiles: ["cpu"]
    <<: *init-ollama
    depends_on:
      - ollama-cpu

  ollama-pull-llama-gpu:
    profiles: ["gpu-nvidia"]
    <<: *init-ollama
    depends_on:
      - ollama-gpu

  ollama-pull-llama-gpu-amd:
    profiles: [gpu-amd]
    <<: *init-ollama
    image: ollama/ollama:rocm
    depends_on:
      - ollama-gpu-amd
