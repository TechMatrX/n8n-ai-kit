name: media-automation

services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB}
    volumes:
      - ${NAS_ROOT:?set NAS_ROOT}/postgres:/var/lib/postgresql/data
    networks:
      - automation-internal
      - observability
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  postgres-public-5433:
    image: ${POSTGRES_PUBLIC_FORWARD_IMAGE:-alpine/socat:latest}
    restart: unless-stopped
    command: -dd TCP-LISTEN:5433,fork,reuseaddr TCP:postgres:5432
    ports:
      - "5433:5433"
    networks:
      - automation-internal
    depends_on:
      postgres:
        condition: service_healthy

  n8n:
    build:
      context: .
      dockerfile: Dockerfile.n8n
      args:
        N8N_IMAGE: ${N8N_IMAGE:-n8nio/n8n:2.27.4}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_PERSONALIZATION_ENABLED: "false"
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
      N8N_SECURE_COOKIE: ${N8N_SECURE_COOKIE:-false}
      WEBHOOK_URL: ${WEBHOOK_URL:?set WEBHOOK_URL}
      N8N_HOST: ${N8N_HOST:?set N8N_HOST}
      N8N_PORT: ${N8N_PORT:-5678}
      N8N_PROTOCOL: ${N8N_PROTOCOL:-https}
      N8N_EDITOR_BASE_URL: ${N8N_EDITOR_BASE_URL:-${WEBHOOK_URL}}
      N8N_DEFAULT_BINARY_DATA_MODE: ${N8N_DEFAULT_BINARY_DATA_MODE:-filesystem}
      N8N_RESTRICT_FILE_ACCESS_TO: ${N8N_RESTRICT_FILE_ACCESS_TO:-/home/node/.n8n-files,/backup,/data/shared}
      N8N_SSRF_PROTECTION_ENABLED: "true"
      N8N_SSRF_ALLOWED_HOSTNAMES: ${N8N_SSRF_ALLOWED_HOSTNAMES:-host.docker.internal,n8n,postgres,rabbitmq,minio,ollama,ollama-nas,qdrant}
      N8N_SSRF_ALLOWED_IP_RANGES: ${N8N_SSRF_ALLOWED_IP_RANGES:-}
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
      N8N_SKIP_AUTH_ON_OAUTH_CALLBACK: "false"
      N8N_RUNNERS_MODE: ${N8N_RUNNERS_MODE:-external}
      N8N_RUNNERS_AUTH_TOKEN: ${N8N_RUNNERS_AUTH_TOKEN:?set N8N_RUNNERS_AUTH_TOKEN}
      N8N_RUNNERS_BROKER_LISTEN_ADDRESS: ${N8N_RUNNERS_BROKER_LISTEN_ADDRESS:-0.0.0.0}
      N8N_NATIVE_PYTHON_RUNNER: ${N8N_NATIVE_PYTHON_RUNNER:-true}
      OTEL_SERVICE_NAME: ${N8N_OTEL_SERVICE_NAME:-media-automation-n8n}
      OTEL_RESOURCE_ATTRIBUTES: ${N8N_OTEL_RESOURCE_ATTRIBUTES:-deployment.environment=production,service.namespace=media-platform}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${N8N_OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
      OTEL_EXPORTER_OTLP_PROTOCOL: ${N8N_OTEL_EXPORTER_OTLP_PROTOCOL:-http/protobuf}
      OTEL_TRACES_EXPORTER: ${N8N_OTEL_TRACES_EXPORTER:-otlp}
      OTEL_METRICS_EXPORTER: ${N8N_OTEL_METRICS_EXPORTER:-otlp}
      OTEL_LOGS_EXPORTER: ${N8N_OTEL_LOGS_EXPORTER:-none}
      OTEL_NODE_DISABLED_INSTRUMENTATIONS: ${N8N_OTEL_NODE_DISABLED_INSTRUMENTATIONS:-fs,dns}
      OTEL_BSP_SCHEDULE_DELAY: ${N8N_OTEL_BSP_SCHEDULE_DELAY:-5000}
      OTEL_BSP_EXPORT_TIMEOUT: ${N8N_OTEL_BSP_EXPORT_TIMEOUT:-3000}
      MEDIA_DISPATCH_MODE: ${MEDIA_DISPATCH_MODE:-rabbitmq}
      RABBITMQ_URL: ${RABBITMQ_URL:?set RABBITMQ_URL}
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE:-media.jobs}
      RABBITMQ_QUEUE: ${RABBITMQ_QUEUE:-media.jobs.ready}
      RABBITMQ_RETRY_EXCHANGE: ${RABBITMQ_RETRY_EXCHANGE:-media.jobs.retry}
      RABBITMQ_RETRY_QUEUE: ${RABBITMQ_RETRY_QUEUE:-media.jobs.retry.1m}
      RABBITMQ_DEAD_QUEUE: ${RABBITMQ_DEAD_QUEUE:-media.jobs.dead}
    ports:
      - "5678:5678"
    volumes:
      - ${NAS_ROOT:?set NAS_ROOT}/n8n:/home/node/.n8n
      - ${NAS_ROOT:?set NAS_ROOT}/backup:/backup
      - ${NAS_ROOT:?set NAS_ROOT}/shared:/data/shared
      - ${NAS_ROOT:?set NAS_ROOT}/n8n-files:/home/node/.n8n-files
    networks:
      - automation-internal
      - control
      - messaging
      - data
      - observability
    extra_hosts:
      - host.docker.internal:host-gateway
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:5678/healthz"]
      interval: 10s
      timeout: 5s
      retries: 12

  task-runners:
    image: ${N8N_RUNNERS_IMAGE:-n8nio/runners:2.27.4}
    restart: unless-stopped
    environment:
      N8N_RUNNERS_AUTH_TOKEN: ${N8N_RUNNERS_AUTH_TOKEN:?set N8N_RUNNERS_AUTH_TOKEN}
      N8N_RUNNERS_TASK_BROKER_URI: http://n8n:5679
      N8N_RUNNERS_LAUNCHER_LOG_LEVEL: ${N8N_RUNNERS_LAUNCHER_LOG_LEVEL:-info}
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-Asia/Ho_Chi_Minh}
    volumes:
      - ./n8n-task-runners.json:/etc/n8n-task-runners.json:ro
    networks:
      - automation-internal
    depends_on:
      n8n:
        condition: service_healthy

  n8n-import:
    profiles: ["maintenance"]
    image: ${N8N_AUTOMATION_IMAGE:-media-automation-n8n}
    restart: "no"
    env_file:
      - .env
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_IMPORT_MODE: ${N8N_IMPORT_MODE:-bootstrap}
      N8N_IMPORT_FORMAT: ${N8N_IMPORT_FORMAT:-auto}
      N8N_IMPORT_CONFIRM_RESTORE: ${N8N_IMPORT_CONFIRM_RESTORE:-}
    entrypoint: /bin/sh
    command:
      - "-c"
      - |
        set -eu
        import_mode="$${N8N_IMPORT_MODE:-bootstrap}"
        import_format="$${N8N_IMPORT_FORMAT:-auto}"
        existing_workflows="$$(n8n list:workflow --onlyId 2>/dev/null || true)"

        case "$$import_mode" in
          bootstrap)
            if [ -n "$$existing_workflows" ]; then
              echo "Existing workflows detected; bootstrap import skipped"
              exit 0
            fi
            ;;
          restore)
            if [ "$${N8N_IMPORT_CONFIRM_RESTORE:-}" != "RESTORE" ]; then
              echo "Restore refused: set N8N_IMPORT_CONFIRM_RESTORE=RESTORE" >&2
              exit 64
            fi
            ;;
          *) echo "Unsupported N8N_IMPORT_MODE=$$import_mode" >&2; exit 64 ;;
        esac

        if [ "$$import_format" = "auto" ]; then
          if [ -d /backup/entities ] && [ -n "$$(ls -A /backup/entities 2>/dev/null)" ]; then
            import_format=entities
          else
            import_format=split
          fi
        fi

        case "$$import_format" in
          entities)
            if [ ! -d /backup/entities ] || [ -z "$$(ls -A /backup/entities 2>/dev/null)" ]; then
              echo "No entity payload found in /backup/entities" >&2
              exit 66
            fi
            if [ "$$import_mode" = "restore" ]; then
              n8n import:entities --inputDir=/backup/entities --truncateTables
            else
              n8n import:entities --inputDir=/backup/entities
            fi
            ;;
          split)
            imported=false
            if [ -d /backup/credentials ] && [ -n "$$(ls -A /backup/credentials 2>/dev/null)" ]; then
              n8n import:credentials --separate --input=/backup/credentials
              imported=true
            fi
            if [ -d /backup/workflows ] && [ -n "$$(ls -A /backup/workflows 2>/dev/null)" ]; then
              n8n import:workflow --separate --input=/backup/workflows
              imported=true
            fi
            if [ "$$imported" != true ]; then
              echo "No split import payload found under /backup" >&2
              exit 66
            fi
            ;;
          *) echo "Unsupported N8N_IMPORT_FORMAT=$$import_format" >&2; exit 64 ;;
        esac

        echo "n8n import completed: mode=$$import_mode format=$$import_format"
    volumes:
      - ${NAS_ROOT:?set NAS_ROOT}/backup:/backup:ro
      - ${NAS_ROOT:?set NAS_ROOT}/n8n-files:/home/node/.n8n-files
    networks:
      - automation-internal
    depends_on:
      postgres:
        condition: service_healthy

  cloudflared:
    image: ${CLOUDFLARED_IMAGE:-cloudflare/cloudflared:latest}
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN:?set CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - automation-internal
      - observability
    depends_on:
      n8n:
        condition: service_healthy

networks:
  automation-internal:
    internal: true
  control:
    external: true
    name: media-control
  messaging:
    external: true
    name: media-messaging
  data:
    external: true
    name: media-data
  observability:
    external: true
    name: media-observability
