services:
  cloudflared:
    image: ${CLOUDFLARED_IMAGE:-cloudflare/cloudflared:latest}
    container_name: cloudflared
    networks: ['demo']
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN:?set CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      n8n:
        condition: service_started

  flowise:
    profiles: ["disabled-on-nas"]

  open-webui:
    profiles: ["disabled-on-nas"]

  qdrant:
    ports: !override
      - 6333:6333
    volumes:
      - ${NAS_ROOT:?set NAS_ROOT in .env}/qdrant:/qdrant/storage

  ollama-cpu:
    profiles: ["cpu"]
    ports: !reset []
    volumes:
      - ${NAS_ROOT:?set NAS_ROOT in .env}/ollama:/root/.ollama

  ollama-gpu:
    profiles: ["disabled-on-nas"]

  ollama-gpu-amd:
    profiles: ["disabled-on-nas"]

  ollama-pull-llama-cpu:
    profiles: ["cpu"]

  ollama-pull-llama-gpu:
    profiles: ["disabled-on-nas"]

  ollama-pull-llama-gpu-amd:
    profiles: ["disabled-on-nas"]

  postgres:
    ports: !reset []
    volumes:
      - ${NAS_ROOT:?set NAS_ROOT in .env}/postgres:/var/lib/postgresql/data

  minio:
    ports: !override
      - 9000:9000
      - 9001:9001
    volumes:
      - ${NAS_ROOT:?set NAS_ROOT in .env}/minio:/data

  rabbitmq:
    volumes:
      - ${NAS_ROOT:?set NAS_ROOT in .env}/rabbitmq:/var/lib/rabbitmq

  n8n-import:
    environment:
      - WEBHOOK_URL=${WEBHOOK_URL:?set WEBHOOK_URL to your NAS URL}
      - N8N_HOST=${N8N_HOST:?set N8N_HOST to your NAS hostname}
      - N8N_PORT=${N8N_PORT:-5678}
      - N8N_PROTOCOL=${N8N_PROTOCOL:-https}
    volumes:
      - ${NAS_ROOT:?set NAS_ROOT in .env}/backup:/backup
      - ${NAS_ROOT:?set NAS_ROOT in .env}/n8n-files:/home/node/.n8n-files

  n8n:
    environment:
      - WEBHOOK_URL=${WEBHOOK_URL:?set WEBHOOK_URL to your NAS URL}
      - N8N_HOST=${N8N_HOST:?set N8N_HOST to your NAS hostname}
      - N8N_PORT=${N8N_PORT:-5678}
      - N8N_PROTOCOL=${N8N_PROTOCOL:-https}
      - N8N_SECURE_COOKIE=${N8N_SECURE_COOKIE:-false}
      - N8N_EDITOR_BASE_URL=${N8N_EDITOR_BASE_URL:-${WEBHOOK_URL}}
      - N8N_SSRF_ALLOWED_HOSTNAMES=${N8N_SSRF_ALLOWED_HOSTNAMES:-host.docker.internal,n8n,postgres,ollama,ollama-cpu,qdrant}
      - N8N_SSRF_ALLOWED_IP_RANGES=${N8N_SSRF_ALLOWED_IP_RANGES:-}
      - NODE_FUNCTION_ALLOW_EXTERNAL=
      - N8N_RUNNERS_MODE=${N8N_RUNNERS_MODE:-external}
      - N8N_RUNNERS_AUTH_TOKEN=${N8N_RUNNERS_AUTH_TOKEN:?set N8N_RUNNERS_AUTH_TOKEN}
      - N8N_RUNNERS_BROKER_LISTEN_ADDRESS=${N8N_RUNNERS_BROKER_LISTEN_ADDRESS:-0.0.0.0}
      - N8N_NATIVE_PYTHON_RUNNER=${N8N_NATIVE_PYTHON_RUNNER:-true}
    ports: !override
      - 5678:5678
    volumes:
      - ${NAS_ROOT:?set NAS_ROOT in .env}/n8n:/home/node/.n8n
      - ./n8n/demo-data:/demo-data
      - ${NAS_ROOT:?set NAS_ROOT in .env}/backup:/backup
      - ${NAS_ROOT:?set NAS_ROOT in .env}/shared:/data/shared
      - ${NAS_ROOT:?set NAS_ROOT in .env}/n8n-files:/home/node/.n8n-files

  task-runners:
    image: ${N8N_RUNNERS_IMAGE:-n8nio/runners:2.23.4}
    container_name: n8n-runners
    restart: unless-stopped
    networks: ['demo']
    environment:
      - N8N_RUNNERS_AUTH_TOKEN=${N8N_RUNNERS_AUTH_TOKEN:?set N8N_RUNNERS_AUTH_TOKEN}
      - N8N_RUNNERS_TASK_BROKER_URI=http://n8n:5679
      - N8N_RUNNERS_LAUNCHER_LOG_LEVEL=${N8N_RUNNERS_LAUNCHER_LOG_LEVEL:-info}
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE:-Asia/Ho_Chi_Minh}
    volumes:
      - ./n8n-task-runners.json:/etc/n8n-task-runners.json:ro
    depends_on:
      n8n:
        condition: service_started
